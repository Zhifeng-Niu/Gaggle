# 交叉编译配置：macOS -> Linux x86_64
# 需要安装：brew install filosottile/musl-cross/musl-cross
# 然后 rustup target add x86_64-unknown-linux-musl
#
# 注意：推荐使用 scripts/build-in-docker.sh (Docker 方案)，
# 因为 solana 依赖链交叉编译较复杂。

[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"
rustflags = ["-C", "target-feature=+crt-static"]
