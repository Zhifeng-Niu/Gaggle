# Gaggle Nginx 反向代理配置 (HTTPS)
# 部署到: /etc/nginx/sites-available/gaggle.conf
# 符号链接: /etc/nginx/sites-enabled/gaggle.conf

upstream gaggle_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── HTTP → HTTPS 重定向 ────────────────────────────────
server {
    listen 80;
    server_name $GAGGLE_DOMAIN _;

    # 将所有 HTTP 请求重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# ── HTTPS 主服务块 ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name $GAGGLE_DOMAIN _;

    # SSL 证书配置 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/$GAGGLE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$GAGGLE_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/$GAGGLE_DOMAIN/chain.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 请求体大小限制
    client_max_body_size 10m;

    # ── 前端静态文件 ──────────────────────────────────
    # Dashboard 主页
    location = / {
        root /opt/gaggle/frontend;
        index index.html;
        try_files /index.html =404;
    }

    # 文档页面
    location = /docs.html {
        root /opt/gaggle/frontend;
        try_files /docs.html =404;
    }

    # 静态资源 (CSS, JS, images)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        root /opt/gaggle/frontend;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    # ── 后端路由 ──────────────────────────────────────

    # 健康检查端点（不记录日志）
    location /health {
        proxy_pass http://gaggle_backend;
        access_log off;
    }

    # WebSocket 路由
    location /ws/ {
        proxy_pass http://gaggle_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时设置
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API 路由
    location /api/ {
        proxy_pass http://gaggle_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
